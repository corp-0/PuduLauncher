name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            portable_name: pudu-launcher-portable-windows-x64.zip
            ext: .exe
          - platform: ubuntu-22.04
            args: ""
            portable_name: pudu-launcher-portable-linux-x64.tar.gz
            ext: ""
          - platform: macos-latest
            args: ""
            portable_name: pudu-launcher-portable-macos-x64.zip
            ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ""

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-v2-

      - name: cache nuget
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src-dotnet/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev=2.44.3-0ubuntu0.22.04.1 \
            libjavascriptcoregtk-4.1-dev=2.44.3-0ubuntu0.22.04.1 \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            zlib1g-dev \
          || sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            zlib1g-dev

      - name: install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PuduLauncher ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: package portable
        shell: bash
        run: |
          mkdir -p portable
          cp "src-tauri/target/release/pudu-launcher${{ matrix.ext }}" portable/
          cp "src-tauri/target/release/pudu-launcher-sidecar${{ matrix.ext }}" portable/
          if [ "${{ matrix.ext }}" = "" ]; then
            chmod +x portable/*
          fi
          if [[ "${{ matrix.portable_name }}" == *.tar.gz ]]; then
            tar -czf "${{ matrix.portable_name }}" -C portable .
          else
            cd portable && 7z a "../${{ matrix.portable_name }}" * || zip -j "../${{ matrix.portable_name }}" *
          fi

      - name: upload portable to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" "${{ matrix.portable_name }}" --clobber
