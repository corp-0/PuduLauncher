name: tauri-build-macos

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/tauri-build

      - name: upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

      - name: upload app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: ignore

      - name: package portable
        run: |
          mkdir -p portable
          cp src-tauri/target/release/pudu-launcher portable/
          cp src-tauri/target/release/pudu-launcher-sidecar portable/
          chmod +x portable/pudu-launcher portable/pudu-launcher-sidecar
          zip -j pudu-launcher-portable-macos-x64.zip portable/*

      - name: upload portable
        uses: actions/upload-artifact@v4
        with:
          name: macos-portable
          path: pudu-launcher-portable-macos-x64.zip
          if-no-files-found: error
