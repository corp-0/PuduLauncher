name: tauri-build-windows

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/tauri-build

      - name: upload nsis
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: package portable
        shell: bash
        run: |
          mkdir -p portable
          cp src-tauri/target/release/pudu-launcher.exe portable/
          cp src-tauri/target/release/pudu-launcher-sidecar.exe portable/
          cd portable && 7z a ../pudu-launcher-portable-windows-x64.zip *

      - name: upload portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: pudu-launcher-portable-windows-x64.zip
          if-no-files-found: error
